{% extends "gflask/base.html" %}

{% block content %}
<div class="login-form">
  <div></div>
  <div>
    <hgroup style="text-align: center;">
      <h4>{{ _("Benvenuto") }}</h4>
      <p>{{ _("Accedi a") }} {{ config.APP_NAME }}</p>
    </hgroup>
    <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next')) }}">
      <fieldset>
        <input type="email" name="email" placeholder="Email address*" autocomplete="email" />
      </fieldset>
      <fieldset style="position: relative;">
        <input type="password" name="password" id="password_input" placeholder="Password*" />
        <button type="button"
                onclick="togglePasswordVisibility('password_input', this)"
                style="position: absolute; right: 0; top: 0; height: calc(1rem * var(--pico-line-height) + var(--pico-form-element-spacing-vertical) * 2 + var(--pico-border-width) * 2); border: none; background: transparent; color: var(--pico-muted-color); padding: 0 1rem; cursor: pointer; display: flex; align-items: center;">
          <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </fieldset>

      <fieldset>
        <input type="checkbox" id="remember" name="remember" />
        <label htmlFor="remember">{{ _("Ricordami") }}</label>
      </fieldset>
      <p><a href="{{ url_for('auth.forgot') }}">{{ _("Hai dimenticato la password") }}</a></p>
      <input type="submit" value="{{ _('Continua') }}" />
    </form>
    <p>{{ _("Non hai un account?") }} <a href="{{ url_for('auth.signup') }}">{{ _("Iscriviti.") }}</a></p>
  </div>
  <div></div>
</div>
{% endblock %}
